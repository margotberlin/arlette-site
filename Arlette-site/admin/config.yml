backend:
  name: git-gateway # Changed from github to use Netlify Identity
  branch: main

# Updated these to point inside your subfolder
media_folder: "Arlette-site/images"
public_folder: "/images"

collections:
  - name: "projects"
    label: "Projects"
    # Added Arlette-site/ prefix
    file: "Arlette-site/data/projects.json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Images"
        name: "images"
        widget: "list"
        field: { label: Image, name: image, widget: image }

  - name: "site"
    label: "Site Settings"
    # Added Arlette-site/ prefix
    file: "Arlette-site/data/site.json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tagline", name: "tagline", widget: "string" }
      - { label: "About", name: "about", widget: "text" }
      - { label: "Email", name: "email", widget: "string" }
