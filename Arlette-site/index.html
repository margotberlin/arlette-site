<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arlette Studio</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-stone-100 text-stone-900 antialiased">
  <header class="fixed inset-x-0 top-0 z-50 px-4 pt-4 md:px-8">
    <div class="mx-auto max-w-6xl rounded-2xl border border-white/40 bg-white/40 backdrop-blur-xl shadow-lg shadow-black/5">
      <div class="flex items-center justify-between px-4 py-3 md:px-6">
        <a href="index.html" class="text-xl font-semibold tracking-wide text-stone-900">Arlette</a>

        <nav class="hidden items-center gap-8 md:flex" aria-label="Primary">
          <a href="index.html" class="text-sm font-medium text-stone-700 transition hover:text-stone-950">Home</a>
          <a href="projects.html" class="text-sm font-medium text-stone-700 transition hover:text-stone-950">Projects</a>
          <a href="about.html" class="text-sm font-medium text-stone-700 transition hover:text-stone-950">About</a>
          <a href="contact.html" class="text-sm font-medium text-stone-700 transition hover:text-stone-950">Contact</a>
        </nav>

        <button
          type="button"
          class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-stone-300/70 text-stone-700 md:hidden"
          aria-expanded="false"
          aria-controls="mobile-nav"
          aria-label="Toggle navigation"
          data-nav-toggle
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>

      <nav id="mobile-nav" class="hidden border-t border-white/50 px-4 py-4 md:hidden" aria-label="Mobile">
        <ul class="space-y-3" data-nav-menu>
          <li><a href="index.html" class="block text-sm font-medium text-stone-700 transition hover:text-stone-950">Home</a></li>
          <li><a href="projects.html" class="block text-sm font-medium text-stone-700 transition hover:text-stone-950">Projects</a></li>
          <li><a href="about.html" class="block text-sm font-medium text-stone-700 transition hover:text-stone-950">About</a></li>
          <li><a href="contact.html" class="block text-sm font-medium text-stone-700 transition hover:text-stone-950">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section
      class="hero flex min-h-[85vh] items-center bg-cover bg-center bg-no-repeat px-6 pt-32 pb-20 md:px-10"
      style="background-image: linear-gradient(rgba(28, 25, 23, 0.45), rgba(28, 25, 23, 0.45)), url('https://picsum.photos/1600/900?grayscale');"
    >
      <div class="mx-auto w-full max-w-6xl">
        <div class="max-w-3xl">
          <h1 id="site-title" class="text-4xl font-semibold leading-tight text-white md:text-6xl"></h1>
          <p id="tagline" class="mt-4 text-lg text-stone-100 md:text-xl"></p>
        </div>
      </div>
    </section>

    <section class="px-6 py-16 md:px-10 md:py-24">
      <div class="mx-auto max-w-6xl">
        <h2 class="text-3xl font-semibold text-stone-900 md:text-4xl">Selected Work</h2>
        <div id="featured-projects" class="mt-10 grid gap-8 md:grid-cols-2"></div>
      </div>
    </section>
  </main>

  <footer class="bg-stone-900 py-12 text-white">
    <div class="mx-auto max-w-6xl px-6 md:px-10">
      <div class="mb-8 grid grid-cols-1 gap-8 md:grid-cols-3">
        <div>
          <h3 class="mb-4 text-lg font-semibold">Arlette Studio</h3>
          <p class="text-stone-400">Contemporary design and creative direction</p>
        </div>
        <div>
          <h4 class="mb-4 text-lg font-semibold">Links</h4>
          <ul class="space-y-2 text-stone-400">
            <li><a href="index.html" class="transition hover:text-white">Home</a></li>
            <li><a href="projects.html" class="transition hover:text-white">Projects</a></li>
            <li><a href="about.html" class="transition hover:text-white">About</a></li>
            <li><a href="contact.html" class="transition hover:text-white">Contact</a></li>
          </ul>
        </div>
        <div>
          <h4 class="mb-4 text-lg font-semibold">Follow</h4>
          <div class="flex gap-4">
            <a href="https://instagram.com" class="text-stone-400 transition hover:text-white" aria-label="Instagram">
              <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073z"/></svg>
            </a>
            <a href="https://linkedin.com" class="text-stone-400 transition hover:text-white" aria-label="LinkedIn">
              <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
            </a>
          </div>
        </div>
      </div>
      <div class="border-t border-stone-800 pt-8">
        <p class="text-center text-stone-400">© Arlette Studio. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
